<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="system-ui,-apple-system,sans-serif">
  <!-- Map bg -->
  <rect width="900" height="560" fill="#3A3D4A"/>

  <!-- Roads -->
  <path d="M0,280 Q200,270 400,265 Q600,260 900,255" stroke="rgba(255,255,255,.12)" stroke-width="5" fill="none"/>
  <path d="M340,0 Q355,200 370,300 Q385,420 400,560" stroke="rgba(255,255,255,.1)" stroke-width="4" fill="none"/>
  <path d="M0,380 Q300,370 500,350 Q700,330 900,340" stroke="rgba(255,255,255,.06)" stroke-width="2" fill="none"/>
  <path d="M600,0 Q590,150 580,280 Q570,400 560,560" stroke="rgba(255,255,255,.06)" stroke-width="2" fill="none"/>

  <!-- Water -->
  <path d="M0,500 Q200,490 400,485 Q650,478 900,484 L900,560 L0,560 Z" fill="#2A3845" opacity=".8"/>

  <!-- Nav bar -->
  <rect width="900" height="46" fill="#1A1A2E" opacity=".95"/>
  <text x="18" y="28" fill="#C8A96E" font-size="15" font-weight="700" font-family="Georgia,serif">Século</text>
  <text x="74" y="28" fill="rgba(255,255,255,.55)" font-size="12">Explorer</text>

  <!-- Isochrone polygon (15 min drive) -->
  <ellipse cx="430" cy="300" rx="180" ry="130" fill="rgba(200,169,110,.18)" stroke="#C8A96E" stroke-width="2" stroke-dasharray="6,3" opacity=".85"/>
  <!-- Inner isochrone (5 min) -->
  <ellipse cx="430" cy="300" rx="90" ry="65" fill="rgba(200,169,110,.12)" stroke="#C8A96E" stroke-width="1.5" stroke-dasharray="4,2" opacity=".7"/>

  <!-- Isochrone label -->
  <rect x="555" y="200" width="118" height="22" rx="11" fill="rgba(200,169,110,.2)" stroke="rgba(200,169,110,.5)" stroke-width="1"/>
  <text x="614" y="214" fill="#C8A96E" font-size="9.5" font-weight="600" text-anchor="middle">⧗ 15 min carro</text>
  <rect x="555" y="228" width="118" height="22" rx="11" fill="rgba(200,169,110,.12)" stroke="rgba(200,169,110,.3)" stroke-width="1"/>
  <text x="614" y="242" fill="rgba(200,169,110,.7)" font-size="9.5" text-anchor="middle">⧗ 5 min carro</text>

  <!-- Land classification patches inside isochrone -->
  <rect x="310" y="250" width="80" height="55" rx="3" fill="rgba(80,160,100,.2)" stroke="rgba(80,160,100,.4)" stroke-width="1"/>
  <text x="350" y="281" fill="rgba(100,200,120,.7)" font-size="8" text-anchor="middle">RAN</text>
  <rect x="440" y="220" width="70" height="45" rx="3" fill="rgba(80,120,200,.15)" stroke="rgba(80,120,200,.3)" stroke-width="1"/>
  <text x="475" y="247" fill="rgba(120,150,220,.65)" font-size="8" text-anchor="middle">ARU</text>

  <!-- Central property pin -->
  <circle cx="430" cy="300" r="10" fill="#C8A96E"/>
  <circle cx="430" cy="300" r="5" fill="#1A1A2E"/>
  <ellipse cx="430" cy="313" rx="6" ry="3" fill="rgba(0,0,0,.3)"/>

  <!-- Right panel: GIS Analysis -->
  <rect x="640" y="50" width="252" height="430" rx="10" fill="rgba(26,26,46,.93)" stroke="rgba(200,169,110,.2)" stroke-width="1"/>
  <text x="660" y="78" fill="#C8A96E" font-size="11" font-weight="700" letter-spacing=".5">ANÁLISE BGRI</text>
  <line x1="656" y1="86" x2="882" y2="86" stroke="rgba(255,255,255,.1)" stroke-width="1"/>

  <!-- Isochrone stats -->
  <text x="656" y="104" fill="rgba(255,255,255,.5)" font-size="8.5" letter-spacing="1">ISÓCRONA 15min</text>
  <text x="656" y="120" fill="rgba(255,255,255,.85)" font-size="13" font-weight="600">12,400</text>
  <text x="656" y="132" fill="rgba(255,255,255,.4)" font-size="9">habitantes na área</text>
  <text x="760" y="120" fill="rgba(255,255,255,.85)" font-size="13" font-weight="600">4,800</text>
  <text x="760" y="132" fill="rgba(255,255,255,.4)" font-size="9">famílias</text>

  <!-- Bar: dens -->
  <text x="656" y="154" fill="rgba(200,169,110,.65)" font-size="8.5" letter-spacing="1">DENSIDADE</text>
  <rect x="656" y="160" width="218" height="10" rx="5" fill="rgba(255,255,255,.08)"/>
  <rect x="656" y="160" width="158" height="10" rx="5" fill="#C8A96E" opacity=".7"/>
  <text x="882" y="169" fill="rgba(255,255,255,.5)" font-size="8.5" text-anchor="end">1,820/km²</text>

  <!-- Bar: desemprego -->
  <text x="656" y="188" fill="rgba(200,169,110,.65)" font-size="8.5" letter-spacing="1">DESEMPREGO</text>
  <rect x="656" y="194" width="218" height="10" rx="5" fill="rgba(255,255,255,.08)"/>
  <rect x="656" y="194" width="62" height="10" rx="5" fill="#C8A96E" opacity=".5"/>
  <text x="882" y="203" fill="rgba(255,255,255,.5)" font-size="8.5" text-anchor="end">7.3%</text>

  <!-- Bar: escolaridade -->
  <text x="656" y="222" fill="rgba(200,169,110,.65)" font-size="8.5" letter-spacing="1">ENSINO SUPERIOR</text>
  <rect x="656" y="228" width="218" height="10" rx="5" fill="rgba(255,255,255,.08)"/>
  <rect x="656" y="228" width="140" height="10" rx="5" fill="#C8A96E" opacity=".65"/>
  <text x="882" y="237" fill="rgba(255,255,255,.5)" font-size="8.5" text-anchor="end">38.4%</text>

  <!-- Bar: setor terciário -->
  <text x="656" y="256" fill="rgba(200,169,110,.65)" font-size="8.5" letter-spacing="1">SETOR TERCIÁRIO</text>
  <rect x="656" y="262" width="218" height="10" rx="5" fill="rgba(255,255,255,.08)"/>
  <rect x="656" y="262" width="184" height="10" rx="5" fill="#C8A96E" opacity=".75"/>
  <text x="882" y="271" fill="rgba(255,255,255,.5)" font-size="8.5" text-anchor="end">84.5%</text>

  <!-- Alojamentos -->
  <text x="656" y="290" fill="rgba(200,169,110,.65)" font-size="8.5" letter-spacing="1">ALOJAMENTOS</text>
  <rect x="656" y="296" width="218" height="10" rx="5" fill="rgba(255,255,255,.08)"/>
  <rect x="656" y="296" width="110" height="10" rx="5" fill="rgba(200,169,110,.55)"/>
  <text x="882" y="305" fill="rgba(255,255,255,.5)" font-size="8.5" text-anchor="end">5,620</text>

  <line x1="656" y1="320" x2="882" y2="320" stroke="rgba(255,255,255,.1)" stroke-width="1"/>

  <!-- POIs -->
  <text x="656" y="338" fill="rgba(200,169,110,.65)" font-size="8.5" letter-spacing="1">EQUIPAMENTOS (1.5 km)</text>
  <text x="656" y="356" fill="rgba(255,255,255,.65)" font-size="10">🏥  2 hospitais  ·  🏫  4 escolas</text>
  <text x="656" y="372" fill="rgba(255,255,255,.65)" font-size="10">🛒  8 supermercados  ·  🚇  1 metro</text>
  <text x="656" y="388" fill="rgba(255,255,255,.65)" font-size="10">🌳  3 parques  ·  ⚽  2 polidesportivos</text>

  <line x1="656" y1="402" x2="882" y2="402" stroke="rgba(255,255,255,.1)" stroke-width="1"/>

  <!-- Land layers -->
  <text x="656" y="420" fill="rgba(200,169,110,.65)" font-size="8.5" letter-spacing="1">CAMADAS GIS ACTIVAS</text>
  <text x="656" y="436" fill="rgba(80,200,120,.7)" font-size="9.5">● RAN (Reserva Agrícola)</text>
  <text x="656" y="452" fill="rgba(120,150,220,.7)" font-size="9.5">● ARU (Reabilitação Urbana)</text>
  <text x="656" y="468" fill="rgba(200,169,110,.5)" font-size="9.5">○ REN — inactiva</text>

  <!-- Bottom status -->
  <rect x="0" y="510" width="900" height="50" fill="rgba(26,26,46,.9)"/>
  <text x="20" y="532" fill="rgba(255,255,255,.7)" font-size="11">Isócrona: 15 min de carro · Valhalla pedestrian + HERE Transit</text>
  <text x="20" y="547" fill="rgba(200,169,110,.6)" font-size="9">Dados BGRI INE Censo 2021 · GIS layers DGT / EEA</text>
</svg>
