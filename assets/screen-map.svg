<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="system-ui,-apple-system,sans-serif">
  <!-- Map background - tile simulation -->
  <rect width="900" height="560" fill="#3A3D4A"/>

  <!-- Map tile grid (subtle) -->
  <line x1="0" y1="140" x2="900" y2="140" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
  <line x1="0" y1="280" x2="900" y2="280" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="900" y2="420" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
  <line x1="225" y1="0" x2="225" y2="560" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="560" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
  <line x1="675" y1="0" x2="675" y2="560" stroke="rgba(255,255,255,.04)" stroke-width="1"/>

  <!-- Roads (abstract) -->
  <path d="M0,310 Q200,290 380,280 Q550,270 900,260" stroke="rgba(255,255,255,.12)" stroke-width="6" fill="none"/>
  <path d="M200,0 Q220,180 260,310 Q300,420 320,560" stroke="rgba(255,255,255,.1)" stroke-width="4" fill="none"/>
  <path d="M0,180 Q300,200 500,220 Q700,240 900,200" stroke="rgba(255,255,255,.07)" stroke-width="2" fill="none"/>
  <path d="M500,0 Q520,150 540,300 Q555,420 560,560" stroke="rgba(255,255,255,.06)" stroke-width="2" fill="none"/>

  <!-- Water body (river/ocean) -->
  <path d="M0,490 Q150,480 300,470 Q500,455 700,450 Q800,448 900,455 L900,560 L0,560 Z" fill="#2A3845" opacity=".8"/>
  <text x="400" y="520" fill="rgba(120,180,220,.4)" font-size="13" text-anchor="middle" letter-spacing="3">ATLANTIC COAST</text>

  <!-- Land classification areas (abstract GIS layer) -->
  <rect x="100" y="80" width="180" height="120" rx="4" fill="rgba(80,160,100,.15)"/>
  <rect x="500" y="120" width="220" height="140" rx="4" fill="rgba(200,140,60,.1)"/>
  <rect x="380" y="60" width="100" height="80" rx="4" fill="rgba(80,120,200,.08)"/>

  <!-- Nav bar -->
  <rect width="900" height="46" fill="#1A1A2E" opacity=".95"/>
  <text x="18" y="28" fill="#C8A96E" font-size="15" font-weight="700" font-family="Georgia,serif">Século</text>
  <text x="74" y="28" fill="rgba(255,255,255,.55)" font-size="12">Explorer</text>
  <!-- Map/Grid toggle -->
  <rect x="720" y="10" width="72" height="26" rx="5" fill="rgba(255,255,255,.08)"/>
  <text x="756" y="26" fill="rgba(255,255,255,.5)" font-size="10" text-anchor="middle">⊞ Grade</text>
  <rect x="798" y="10" width="68" height="26" rx="5" fill="#C8A96E"/>
  <text x="832" y="26" fill="#1A1A2E" font-size="10" font-weight="700" text-anchor="middle">🗺 Mapa</text>

  <!-- GIS Layer buttons (top right) -->
  <rect x="748" y="58" width="140" height="26" rx="5" fill="rgba(26,26,46,.85)" stroke="rgba(200,169,110,.4)" stroke-width="1"/>
  <text x="818" y="74" fill="#C8A96E" font-size="10" font-weight="600" text-anchor="middle">🌿 Veg. ●</text>
  <rect x="748" y="90" width="140" height="26" rx="5" fill="rgba(26,26,46,.85)" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
  <text x="818" y="106" fill="rgba(255,255,255,.55)" font-size="10" text-anchor="middle">🌊 Hidrol.</text>
  <rect x="748" y="122" width="140" height="26" rx="5" fill="rgba(26,26,46,.85)" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
  <text x="818" y="138" fill="rgba(255,255,255,.55)" font-size="10" text-anchor="middle">🏛 PDM/ARU</text>
  <rect x="748" y="154" width="140" height="26" rx="5" fill="rgba(26,26,46,.85)" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
  <text x="818" y="170" fill="rgba(255,255,255,.55)" font-size="10" text-anchor="middle">🌱 COS 2023</text>
  <rect x="748" y="186" width="140" height="26" rx="5" fill="rgba(26,26,46,.85)" stroke="rgba(255,80,80,.4)" stroke-width="1"/>
  <text x="818" y="202" fill="rgba(255,120,100,.7)" font-size="10" text-anchor="middle">🔥 Incêndios</text>

  <!-- Property markers -->
  <!-- Marker 1 (selected) -->
  <circle cx="340" cy="200" r="14" fill="#C8A96E" opacity=".9"/>
  <text x="340" y="205" fill="#1A1A2E" font-size="10" font-weight="700" text-anchor="middle">€380k</text>
  <!-- Marker shadow -->
  <ellipse cx="340" cy="216" rx="8" ry="4" fill="rgba(0,0,0,.35)"/>

  <!-- Marker 2 -->
  <circle cx="480" cy="160" r="12" fill="#C8A96E" opacity=".75"/>
  <text x="480" y="164" fill="#1A1A2E" font-size="9" font-weight="700" text-anchor="middle">€520k</text>

  <!-- Marker 3 -->
  <circle cx="580" cy="220" r="11" fill="#C8A96E" opacity=".7"/>
  <text x="580" y="224" fill="#1A1A2E" font-size="9" font-weight="700" text-anchor="middle">€295k</text>

  <!-- Marker 4 -->
  <circle cx="280" cy="310" r="11" fill="#C8A96E" opacity=".7"/>
  <text x="280" y="314" fill="#1A1A2E" font-size="9" font-weight="700" text-anchor="middle">€615k</text>

  <!-- Marker 5 -->
  <circle cx="640" cy="290" r="10" fill="#C8A96E" opacity=".65"/>
  <text x="640" y="294" fill="#1A1A2E" font-size="8" font-weight="700" text-anchor="middle">€440k</text>

  <!-- Marker 6 -->
  <circle cx="200" cy="250" r="10" fill="#C8A96E" opacity=".6"/>
  <text x="200" y="254" fill="#1A1A2E" font-size="8" font-weight="700" text-anchor="middle">€330k</text>

  <!-- Marker 7 small -->
  <circle cx="430" cy="350" r="9" fill="#C8A96E" opacity=".6"/>
  <text x="430" y="353" fill="#1A1A2E" font-size="7" font-weight="700" text-anchor="middle">€275k</text>

  <!-- Popup card for selected marker -->
  <rect x="352" y="160" width="190" height="100" rx="8" fill="rgba(255,255,255,.97)" filter="url(#shadow)"/>
  <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,.25)"/></filter>
  <!-- Popup accent line -->
  <rect x="352" y="160" width="190" height="3" rx="2" fill="#C8A96E"/>
  <!-- Popup image area -->
  <rect x="352" y="163" width="60" height="94" rx="0" fill="#C8C0B0"/>
  <rect x="352" y="252" width="60" height="5" rx="0" fill="#C8C0B0"/>
  <!-- Popup text -->
  <text x="422" y="178" fill="#1A1A2E" font-size="11" font-weight="700">€ 380,000</text>
  <text x="422" y="193" fill="#5C5750" font-size="9">T2 · 89 m² · Cascais</text>
  <text x="422" y="207" fill="rgba(91,87,80,.6)" font-size="8">ImóVirtual</text>
  <rect x="422" y="214" width="58" height="16" rx="8" fill="rgba(200,169,110,.18)" stroke="rgba(200,169,110,.5)" stroke-width="1"/>
  <text x="451" y="225" fill="#C8A96E" font-size="8" font-weight="600" text-anchor="middle">Score 87</text>
  <rect x="422" y="238" width="80" height="16" rx="4" fill="#1A1A2E"/>
  <text x="462" y="249" fill="#C8A96E" font-size="8" font-weight="600" text-anchor="middle">Ver imóvel →</text>

  <!-- Bottom status bar -->
  <rect x="0" y="510" width="900" height="50" fill="rgba(26,26,46,.9)"/>
  <text x="20" y="532" fill="rgba(255,255,255,.7)" font-size="11">47 imóveis no mapa</text>
  <text x="20" y="547" fill="rgba(200,169,110,.6)" font-size="9">9 portais · Cascais · Lisboa</text>
  <rect x="760" y="518" width="120" height="26" rx="5" fill="#C8A96E"/>
  <text x="820" y="534" fill="#1A1A2E" font-size="10" font-weight="700" text-anchor="middle">↓ Exportar CSV</text>
</svg>
