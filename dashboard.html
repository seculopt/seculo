<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Your saved properties — Século Explorer dashboard." />
  <title>My Properties — Século Explorer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/nav.css" />
  <link rel="stylesheet" href="css/animations.css" />

  <style>
    /* ── Page shell ── */
    .dash-page {
      min-height: calc(100vh - 72px);
      background: var(--color-bg);
      padding: 2.5rem 1rem 4rem;
    }
    .dash-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .dash-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .dash-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--color-primary);
      margin: 0 0 0.25rem;
    }
    .dash-meta {
      font-size: 0.85rem;
      color: var(--color-mid);
    }
    .dash-tier {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--color-accent);
      color: var(--color-primary);
      margin-left: 0.5rem;
      vertical-align: middle;
    }
    .dash-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-shrink: 0;
    }

    /* ── Loading ── */
    .dash-loading {
      text-align: center;
      padding: 5rem 0;
      color: var(--color-mid);
    }
    .dash-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--color-divider);
      border-top-color: var(--color-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .dash-empty {
      text-align: center;
      padding: 5rem 1rem;
      display: none;
    }
    .dash-empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.35;
    }
    .dash-empty h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--color-primary);
      margin-bottom: 0.5rem;
    }
    .dash-empty p {
      color: var(--color-mid);
      font-size: 0.9rem;
      max-width: 340px;
      margin: 0 auto 1.5rem;
      line-height: 1.65;
    }

    /* ── Grid ── */
    .dash-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      display: none;
    }
    @media (max-width: 900px) { .dash-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .dash-grid { grid-template-columns: 1fr; } }

    /* ── Property card ── */
    .prop-card {
      background: var(--color-white);
      border: 1px solid var(--color-divider);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.15s;
    }
    .prop-card:hover { box-shadow: 0 4px 20px rgba(25,25,39,0.1); }

    .prop-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: var(--color-bg);
      display: block;
      flex-shrink: 0;
    }
    .prop-img-placeholder {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, #f0ede8 0%, #e8e4dc 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-mid);
      font-size: 2rem;
      flex-shrink: 0;
    }

    .prop-body {
      padding: 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .prop-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
    }
    .prop-portal {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--color-accent);
    }
    .prop-status {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.15rem 0.45rem;
      border-radius: 10px;
      background: #f0f0f5;
      color: var(--color-mid);
    }
    .prop-status.interested { background: #f0faf4; color: #27664a; }
    .prop-status.visited    { background: #fff8e6; color: #8a6200; }
    .prop-status.discarded  { background: #fdf2f2; color: #c0392b; }

    .prop-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--color-primary);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .prop-location {
      font-size: 0.8rem;
      color: var(--color-mid);
    }
    .prop-price {
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-primary);
      margin-top: 0.15rem;
    }
    .prop-details {
      font-size: 0.78rem;
      color: var(--color-mid);
    }
    .prop-notes {
      font-size: 0.78rem;
      color: var(--color-mid);
      font-style: italic;
      border-left: 2px solid var(--color-accent);
      padding-left: 0.5rem;
      margin-top: 0.25rem;
    }
    .prop-expiry {
      font-size: 0.73rem;
      color: var(--color-mid);
      margin-top: auto;
      padding-top: 0.5rem;
    }
    .prop-expiry.expiring-soon { color: #c0392b; }

    .prop-footer {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--color-divider);
      background: var(--color-bg);
    }
    .prop-btn {
      flex: 1;
      padding: 0.45rem 0.6rem;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: 1px solid var(--color-divider);
      background: var(--color-white);
      color: var(--color-primary);
      text-align: center;
      transition: background 0.12s, border-color 0.12s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }
    .prop-btn:hover { background: #f4f1ec; border-color: var(--color-accent); }
    .prop-btn.share { color: var(--color-accent); border-color: var(--color-accent); }
    .prop-btn.delete { color: #c0392b; border-color: #e8b4b4; }
    .prop-btn.delete:hover { background: #fdf2f2; }

    /* ── Toast ── */
    #dashToast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(1rem);
      background: var(--color-primary);
      color: var(--color-white);
      padding: 0.65rem 1.25rem;
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 9999;
      white-space: nowrap;
    }
    #dashToast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Nav user chip ── */
    .nav-user {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      color: var(--color-mid);
    }
    .nav-user-name {
      font-weight: 500;
      color: var(--color-primary);
    }
    .nav-signout {
      font-size: 0.78rem;
      color: var(--color-mid);
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
    }
    .nav-signout:hover { color: var(--color-primary); text-decoration: underline; }
  </style>
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="site-nav" id="site-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo" aria-label="Século Explorer — Home">
        <img src="assets/logo-light.svg" alt="Século Explorer" />
      </a>
      <ul class="nav-links">

        <li><a href="index.html#how-it-works" data-en="How It Works" data-pt="Como Funciona">How It Works</a></li>
        <li><a href="products.html" data-en="Plans" data-pt="Planos">Plans</a></li>
        <li>
          <a href="https://seculo-api.vercel.app/?tier=free" class="btn btn-outline" data-en="Open Engine" data-pt="Abrir Motor">Open Engine</a>
        </li>
      </ul>
      <div class="nav-user" id="navUser" style="display:none;">
        <span class="nav-user-name" id="navUserName"></span>

      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="en">EN</button>

        <span>|</span>
        <button class="lang-btn" data-lang="es">ES</button>

      <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- DASHBOARD -->
  <main class="dash-page">
    <div class="dash-inner">

      <!-- Header -->
      <div class="dash-header">
        <div>
          <h1 class="dash-title">
            <span data-en="My Properties" data-pt="As minhas propriedades" data-es="Mis propiedades">My Properties</span>
            <span class="dash-tier" id="tierBadge" style="display:none;"></span>
          </h1>
          <p class="dash-meta" id="dashMeta"></p>
        </div>
        <div class="dash-actions">
          <button class="btn btn-outline" id="copyAllBtn" style="display:none" onclick="copyAllLinks()" data-en="&#128203; Copy all links" data-pt="&#128203; Copiar todos os links" data-es="&#128203; Copiar todos los links">&#128203; Copy all links</button>
          <a href="https://seculo-api.vercel.app/?tier=free" class="btn btn-primary" id="engineLink" data-en="View on map" data-pt="Ver no mapa" data-es="Ver en el mapa">View on map</a>
        </div>
      </div>

      <!-- Loading -->
      <div class="dash-loading" id="dashLoading">
        <div class="dash-spinner"></div>
        <p data-en="Loading your properties…" data-pt="A carregar as suas propriedades…" data-es="Cargando tus propiedades…">Loading your properties…</p>
      </div>

      <!-- Empty state -->
      <div class="dash-empty" id="dashEmpty">
        <div class="dash-empty-icon">&#128278;</div>
        <h2 data-en="No saved properties yet" data-pt="Sem propriedades guardadas" data-es="Sin propiedades guardadas">No saved properties yet</h2>
        <p data-en="Use the engine to search for properties in Portugal. When you find one you like, click the bookmark button to save it here." data-pt="Usa o motor de busca para encontrar imóveis em Portugal. Quando encontrares um que gostes, clica no marcador para o guardar aqui." data-es="Usa el motor de búsqueda para encontrar propiedades en Portugal. Cuando encuentres una que te guste, haz clic en el marcador para guardarla aquí.">Use the engine to search for properties in Portugal. When you find one you like, click the bookmark button to save it here.</p>
        <a href="https://seculo-api.vercel.app/?tier=free" class="btn btn-primary" data-en="Start searching" data-pt="Começar a explorar" data-es="Empezar a explorar">Start searching</a>
      </div>

      <!-- Grid -->
      <div class="dash-grid" id="dashGrid"></div>

    </div>
  </main>

  <div id="dashToast"></div>

  <!-- SCRIPTS -->
  <script src="js/nav.js"></script>
  <script src="js/lang.js"></script>
  <script src="js/cookies.js"></script>
